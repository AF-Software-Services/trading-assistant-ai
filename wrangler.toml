name = "trading-assistant-ai"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = [
  "0 * * * 1-5",   # hourly, Monday-Friday — full trading week
  "0 21-23 * * 7"  # Sunday 21:00/22:00/23:00 UTC — catches the Sydney open, the week's first fresh candles
]

[[d1_databases]]
binding = "DB"
database_name = "trading-assistant-ai"
database_id = "96417c47-1152-465b-9ff2-cec6fe394990"

[[kv_namespaces]]
binding = "KV"
id = "a82afed2ad864e6bb1d11cd57e2f8219"

[limits]
cpu_ms = 300000

[observability]
enabled = true

[assets]
directory = "./dist/ui"

[vars]
ENVIRONMENT = "production"
MARKET_DATA_PROVIDER = "ctrader"
